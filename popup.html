<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shanbay Helper</title>
    <style type="text/css">
        body {
            font-family: "PingFangSC-Light", "Helvetica Neue", Helvetica, "Microsoft YaHei", Arial, sans-serif;
            margin: 0;
            text-align: center;
            word-break: keep-all;
            padding: 8px 12px 16px;
            min-width: 200px;
            color: #333;
        }
        h2 {
            margin: 8px 0 6px;
            font-size: 16px;
            font-weight: 600;
        }
        ul {
            padding: 0;
            margin: 0;
        }
        li {
            list-style-type: none;
            white-space: nowrap;
            margin: 10px 0;
        }
        button {
            background: #209e85;
            padding: 0 10px;
            border-radius: 4px;
            border: none;
            min-width: 110px;
            height: 28px;
            color: #fff;
            user-select: none;
            outline: none;
            cursor: pointer;
            font-size: 13px;
        }
        button.secondary {
            background: #fff;
            color: #209e85;
            border: 1px solid #209e85;
        }
        button:disabled {
            opacity: 0.55;
            cursor: default;
        }
        #auth-status {
            font-size: 12px;
            line-height: 1.4;
            margin: 4px 0 8px;
            padding: 6px 8px;
            border-radius: 4px;
            background: #f5f5f5;
            white-space: normal;
            word-break: break-word;
        }
        #auth-status.logged_in {
            background: #e8f7f3;
            color: #0d7a62;
        }
        #auth-status.logged_out,
        #auth-status.error {
            background: #fff3f0;
            color: #c44;
        }
        #auth-status.checking {
            background: #f5f5f5;
            color: #888;
        }
        #auth-hint {
            font-size: 11px;
            color: #888;
            line-height: 1.35;
            white-space: normal;
            margin: 0 0 6px;
            padding: 0 4px;
        }
        .hide {
            display: none !important;
        }
        a {
            color: #209e85;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div>
    <h2>Shanbay Helper</h2>
    <div id="auth-status" class="checking">Checking login…</div>
    <p id="auth-hint" class="hide"></p>
    <ul>
        <li><a href="https://github.com/maicss/chrome-shanbay-v2" target="_blank" rel="noopener">About</a></li>
        <li><button id="batch-add" class="hide">Batch add words</button></li>
        <li><button id="begin-learning" class="hide">Start learning</button></li>
        <li><button id="options" class="hide">Settings</button></li>
        <li><button id="recheck" class="secondary hide" type="button">Recheck login</button></li>
        <li><button id="login" class="hide" type="button">Log in to Shanbay</button></li>
    </ul>
</div>
</body>
<script type="module" src="js/popup.mjs" charset="UTF-8"></script>
</html>
